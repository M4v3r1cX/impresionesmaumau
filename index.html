<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <script>
    let total = 0;
    let totalDisplay = '';

    document.addEventListener("DOMContentLoaded", function(event) {
            totalDisplay = document.getElementById('total');
        });

    function sumar(num) {
        total += num;
        totalDisplay.innerHTML = total;
    }

    function reiniciar() {
        total = 0;
        totalDisplay.innerHTML = total;
    }
  </script>
  <title>Terminal Impresiones Mau Mau</title>
</head>

<body>
  <h1>Terminal de Venta - Impresiones Mau Mau</h1>
  <hr />
  <h1>Su total es de $<b id="total">0</b></h1>
  <hr >
  <button type="button" onclick="reiniciar()">Reiniciar</button>
  <hr >
  <button type="button" onclick="sumar(100)">Impresión BN</button>
  <button type="button" onclick="sumar(200)">Impresión Full BN</button>
  <button type="button" onclick="sumar(150)">Impresión Color</button>
  <button type="button" onclick="sumar(300)">Impresión Full Color</button>
  <button type="button" onclick="sumar(50)">Formatear Imagen</button>
  <hr >
  <button type="button" onclick="sumar(500)">Termolaminado Carnet</button>
  <button type="button" onclick="sumar(850)">Termolaminado Medio Carta</button>
  <button type="button" onclick="sumar(1200)">Termolaminado Carta</button>
  <button type="button" onclick="sumar(1500)">Termolaminado Oficio</button>
  <hr >
  <button type="button" onclick="sumar(2600)">Anillado Hasta 70 hjs</button>
  <button type="button" onclick="sumar(3000)">Anillado Hasta 120 hjs</button>
  <button type="button" onclick="sumar(3500)">Anillado Hasta 200 hjs</button>
  <button type="button" onclick="sumar(4500)">Anillado Hasta 400 hjs</button>
  <hr >
  <button type="button" onclick="sumar(1000)">Foto Carnet</button>
  <button type="button" onclick="sumar(650)">1 x 13x18</button>
  <button type="button" onclick="sumar(1000)">2 x 13x18</button>
  <button type="button" onclick="sumar(1000)">1 x A4</button>
  <button type="button" onclick="sumar(500)">1 x 10x15</button>
  <button type="button" onclick="sumar(1000)">3 x 10x15</button>
  <button type="button" onclick="sumar(3000)">10 x 10x15</button>
  <button type="button" onclick="sumar(15000)">50 x 10x15</button>
  <button type="button" onclick="sumar(25000)">100 x 10x15</button>
</body>

</html>
