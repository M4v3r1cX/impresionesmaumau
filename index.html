<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css" />
  <script type="text/javascript" src="main.js"></script>
  <title>Impresiones Mau Mau</title>
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col-md-6 d-flex align-items-center justify-content-end">
        <img src="images/header.png" height="200px" width="200px" alt="Logo" class="logo">
      </div>
      <div class="col-md-6 d-flex align-items-center justify-content-start">
        <h1 style="text-align: center;">Impresiones<br > Mau Mau</h1>
      </div>
    </div>
    <hr />
    <div class="row align-items-center">
      <h2 style="text-align: center;">Su total es de $<b id="total">0</b></h2>
    </div>
    <hr />
    <div class="row align-items-center" style="height: 100px;">
      <h2 style="text-align: center;">Detalle de la venta</h2>
      <p style="text-align: center; max-height: 100px; overflow-y: scroll;" id="detalle"></p>
    </div><br /><br />
    <div class="row align-items-center">
      <button class="btn btn-primary" type="button" onclick="reiniciar()">Reiniciar</button>
    </div>
    <br /><br />
    <div class="row d-flex align-items-stretch overflow-auto">
      <div class="col-md-3">
        <h3 style="text-align: center;">Escaneo/Impresiones</h3>
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Escaneo: $100'); sumar(100)">Escaneo</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Impresión BN: $100'); sumar(100)">Impresión BN</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Impresión Full BN: $200'); sumar(200)">Impresión Full BN</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Impresión Color: $150'); sumar(150)">Impresión Color</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Impresión Full Color: $300'); sumar(300)">Impresión Full Color</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Formato Imagen: $50'); sumar(50)">Formato Imagen</button>
        </div>
        <h3 style="text-align: center;">Páginas Personalizadas</h3>
        <div>
          <input type="number" id="paginasPersonalizadas" class="form-control" placeholder="0" min="1"><br />
          <div class="row">
            <div class="col-md-9 align-items-start">
              <input type="checkbox" id="checkboxColor" class="form-check-input">
              <label for="checkboxColor" class="form-check-label">En Color</label></input>
              <input type="checkbox" id="checkboxFull" class="form-check-input">
              <label for="checkboxFull" class="form-check-label">Full</label></input>
              <input type="checkbox" id="checkboxDuplex" class="form-check-input">
              <label for="checkboxDuplex" class="form-check-label">Duplex</label></input>
            </div>
            <div class="col-md-3 align-items-end">
              <button type="button" class="btn btn-primary align-self-end" onclick="agregarPaginasPersonalizadas()">Cotizar</button>
              </div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <h3 style="text-align: center;">Termolaminados</h3>
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Termolaminado Carnet: $500'); sumar(500)">Carnet</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Termolaminado Medio Carta: $850'); sumar(850)">Medio Carta</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Termolaminado Carta: $1200'); sumar(1200)">Carta</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Termolaminado Oficio: $1500'); sumar(1500)">Oficio</button>
        </div>
      </div>
      <div class="col-md-3">
        <h3 style="text-align: center;">Anillados</h3>
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Anillado Hasta 70 hjs: $2600'); sumar(2600)">Hasta 70 hjs</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Anillado Hasta 120 hjs: $3000'); sumar(3000)">Hasta 120 hjs</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Anillado Hasta 200 hjs: $3500'); sumar(3500)">Hasta 200 hjs</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Anillado Hasta 400 hjs: $4500'); sumar(4500)">Hasta 400 hjs</button>
        </div>
      </div>
      <div class="col-md-3">
        <h3 style="text-align: center;">Fotografías</h3>
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('Foto Carnet: $1000'); sumar(1000)">Foto Carnet</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('1 x 13x18: $650'); sumar(650)">1 x 13x18</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('2 x 13x18: $1000'); sumar(1000)">2 x 13x18</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('1 x A4: $1000'); sumar(1000)">1 x A4</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('1 x 10x15: $500'); sumar(500)">1 x 10x15</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('3 x 10x15: $1000'); sumar(1000)">3 x 10x15</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('10 x 10x15: $3000'); sumar(3000)">10 x 10x15</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('50 x 10x15: $15000'); sumar(15000)">50 x 10x15</button>
          <button type="button" class="btn btn-primary" onclick="agregarDetalle('100 x 10x15: $25000'); sumar(25000)">100 x 10x15</button>
        </div>
      </div>
    </div>
    <br /><br />
  </div>
</body>
</html>
